description: >-
  FinOps view of Printful spend. Printful charges no API fee; cost is driven by
  per-order fulfillment - the per-product base cost (blank plus one standard
  print placement), optional add-ons (extra print placements, inside labels,
  embroidery digitization), and flat-rate shipping by category and destination.
  An optional Printful Growth membership ($24.99/mo) reduces product costs by up
  to 33%.
notes: >-
  Per-product and shipping rates vary by product, technique, and destination
  and change over time. Verify current rates on the Printful pricing page
  during reconciliation.
sources:
- https://www.printful.com/pricing
- https://www.printful.com/plans
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
