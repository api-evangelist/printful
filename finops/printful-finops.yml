meters:
- name: product_fulfillment
  description: Per-product base fulfillment cost (blank product plus one standard print placement).
  unit: products
  aggregation: sum
  dimensions:
  - store
  - product
  - technique
- name: extra_placements
  description: Additional print placements beyond the included standard placement.
  unit: placements
  aggregation: sum
  dimensions:
  - store
  - product
- name: branding_addons
  description: Branding add-ons such as inside labels and packing inserts.
  unit: items
  aggregation: sum
  dimensions:
  - store
  - product
- name: embroidery_digitization
  description: One-time embroidery digitization charge per design.
  unit: designs
  aggregation: sum
  dimensions:
  - store
  - design
- name: shipping
  description: Flat-rate shipping billed per order by product category and destination.
  unit: orders
  aggregation: sum
  dimensions:
  - store
  - destination
  - category
- name: membership_fee
  description: Optional Printful Growth membership subscription fee.
  unit: subscription
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Pull Printful order and invoice exports; track fulfillment and shipping cost per order and product.
- name: Allocation
  description: Tag orders and stores per brand/storefront; map fulfillment cost to product lines.
- name: Optimization
  description: Evaluate the Growth membership against volume (up to 33% off); route orders to the nearest fulfillment center; minimize extra placements and add-ons.
- name: Accountability
  description: Review per-product margin (retail price minus fulfillment plus shipping) regularly against targets.
maintainers:
