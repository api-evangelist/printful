serviceCategory: Commerce and Fulfillment
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Per Order
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Printful
  ServiceCategory: Commerce and Fulfillment
  ProviderName: Printful
  PublisherName: Printful
