aid: printful
url: https://raw.githubusercontent.com/api-evangelist/printful/refs/heads/main/apis.yml
name: Printful
kind: company
description: Printful is a print-on-demand and order-fulfillment platform that lets
  merchants design custom products and have them produced and shipped on demand. The
  Printful API (v2 and v1) exposes the product catalog, store products, order management,
  file library, mockup generator, shipping rates, warehouse products, and webhooks
  over a REST interface authenticated with OAuth 2.0 / Bearer tokens.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Print on Demand
- Fulfillment
- Ecommerce
- Dropshipping
- Merchandise
created: '2026-06-25'
modified: '2026-06-25'
specificationVersion: '0.19'
